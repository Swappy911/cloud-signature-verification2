<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg-color: #0b0e14; --lamp-shade: #ffd700; --on: 0; }
        body { min-height: 100vh; display: grid; place-items: center; background: var(--bg-color); color: white; margin: 0; font-family: sans-serif; }
        .lamp-wrapper { width: 200px; height: 300px; }
        .lamp-shade { fill: #333; transition: 0.5s; }
        [data-on="true"] .lamp-shade { fill: var(--lamp-shade); filter: drop-shadow(0 0 20px var(--lamp-shade)); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 2rem; border-radius: 20px; width: 350px; border: 1px solid rgba(255,255,255,0.1); opacity: 0; transform: translateY(20px); pointer-events: none; transition: 0.5s; }
        .glass-card.active { opacity: 1; transform: translateY(0); pointer-events: all; }
        .form-control { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .input-group-text { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888; cursor: pointer; }
    </style>
</head>
<body data-on="false">
    <div class="lamp-wrapper">
        <svg viewBox="0 0 200 300">
            <rect fill="#222" x="92" y="100" width="16" height="160" rx="8" />
            <g class="pull-cord" style="cursor:pointer">
                <line stroke="#444" stroke-width="2" x1="130" y1="110" x2="130" y2="180" />
                <circle class="cord-hit" fill="gold" cx="130" cy="190" r="6" />
            </g>
            <path class="lamp-shade" d="M30 110 C 30 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z" />
        </svg>
    </div>

    <div class="glass-card">
        <h4 class="text-center mb-4">Cloud Gate</h4>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="small text-secondary">Username or Email</label>
                <input type="text" name="username" class="form-control" placeholder="admin@cloud.com" required>
            </div>
            <div class="mb-3">
                <label class="small text-secondary">Password</label>
                <div class="input-group">
                    <input type="password" id="pass" name="password" class="form-control" placeholder="••••••••" required>
                    <span class="input-group-text" onclick="togglePass()"><i id="eye" class="bi bi-eye"></i></span>
                </div>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Sign In</button>
            <a href="/register" class="d-block text-center mt-3 small text-secondary text-decoration-none">Create New User</a>
        </form>
    </div>

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>
    <script>
        gsap.registerPlugin(Draggable);
        function togglePass() {
            const p = document.getElementById('pass');
            const i = document.getElementById('eye');
            p.type = p.type === "password" ? "text" : "password";
            i.classList.toggle("bi-eye"); i.classList.toggle("bi-eye-slash");
        }
        Draggable.create(".pull-cord", {
            type: "y", bounds: { minY: 0, maxY: 50 },
            onRelease: function() {
                if (this.y > 25) {
                    document.body.setAttribute('data-on', document.body.getAttribute('data-on') !== 'true');
                    document.querySelector('.glass-card').classList.toggle('active');
                }
                gsap.to(".pull-cord", { y: 0, duration: 0.4 });
            }
        });
    </script>
</body>
</html>
