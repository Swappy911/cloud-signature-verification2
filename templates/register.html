<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Gate - Create User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #0b0e14; min-height: 100vh; display: grid; place-items: center; font-family: 'Inter', sans-serif; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 3rem; border-radius: 25px; width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .form-control { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .btn-register { background: #00d4ff; border: none; color: black; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="glass-card">
    <h2 class="text-center mb-4">Create Account</h2>
    <form method="POST">
        <div class="mb-3"><label class="small text-secondary mb-1">Email Address</label><input type="email" name="email" class="form-control" required></div>
        <div class="mb-3"><label class="small text-secondary mb-1">Username</label><input type="text" name="username" class="form-control" required></div>
        <div class="mb-4">
            <label class="small text-secondary mb-1">Password</label>
            <div class="input-group">
                <input type="password" id="regPass" name="password" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" onclick="toggleRegPass()"><i id="regIcon" class="bi bi-eye"></i></button>
            </div>
        </div>
        <button type="submit" class="btn btn-register w-100">Create User</button>
        <div class="text-center mt-4"><a href="/login" style="color:#888; text-decoration:none;">Sign In Instead</a></div>
    </form>
    {% if error %}<p class="text-danger text-center mt-3 small">{{ error }}</p>{% endif %}
</div>
<script>
    function toggleRegPass() {
        const passInput = document.getElementById('regPass');
        const icon = document.getElementById('regIcon');
        if (passInput.type === "password") { passInput.type = "text"; icon.classList.replace("bi-eye", "bi-eye-slash"); }
        else { passInput.type = "password"; icon.classList.replace("bi-eye-slash", "bi-eye"); }
    }
</script>
</body>
</html>
