<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Signature Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --lamp-shade: #00d4ff;
            --accent-color: #00d4ff;
            --glow-color: rgba(0, 212, 255, 0.2);
            --on: 0;
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg-color);
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background var(--transition);
            color: white;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, var(--glow-color), transparent 70%);
            opacity: var(--on);
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .container-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5vw;
            z-index: 1;
            flex-wrap: wrap;
            width: 90%;
        }

        /* Lamp Styles */
        .lamp-wrapper { width: 250px; height: 350px; }
        .lamp-shade { fill: #333; transition: fill var(--transition); }
        [data-on="true"] .lamp-shade { fill: var(--lamp-shade); filter: drop-shadow(0 0 20px var(--lamp-shade)); }
        .lamp-base { fill: #222; }
        .cord-bead { fill: var(--accent-color); }
        .cord-line { stroke: #444; stroke-width: 2; }

        /* Modern Glass Form */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(30px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s ease-out;
        }

        .glass-card.active { opacity: 1; transform: translateY(0); pointer-events: all; }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 10px;
        }

        .btn-verify {
            background: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
        }

        .preview-img { max-height: 80px; margin-top: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body data-on="{{ 'true' if result or similarity else 'false' }}">

<div class="container-main">
    <div class="lamp-wrapper">
        <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
            <rect class="lamp-base" x="92" y="100" width="16" height="160" rx="8" />
            <rect class="lamp-base" x="60" y="250" width="80" height="12" rx="6" />
            <g class="pull-cord">
                <line class="cord-line" x1="130" y1="110" x2="130" y2="180" />
                <circle class="cord-bead" cx="130" cy="190" r="6" />
                <circle class="cord-hit" cx="130" cy="190" r="25" fill="transparent" style="cursor:pointer" />
            </g>
            <path class="lamp-shade" d="M30 110 C 30 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z" />
        </svg>
    </div>

    <div class="glass-card {{ 'active' if result or similarity else '' }}">
        <h3 class="text-center mb-4">Cloud Verifier</h3>

        <form action="/verify" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="small text-secondary">Document</label>
                <input type="file" name="document" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small text-secondary">Signature</label>
                <input type="file" name="signature" class="form-control" onchange="document.getElementById('pv').src=URL.createObjectURL(event.target.files[0]); document.getElementById('pv').style.display='block'" required>
                <img id="pv" class="preview-img" />
            </div>
            <button type="submit" class="btn btn-verify w-100 mb-3">Verify Signature</button>
            <a href="/dashboard" class="btn btn-outline-light w-100 btn-sm">Open Analytics Dashboard</a>
        </form>

        {% if result %}
        <div class="alert mt-3 {{ 'alert-success' if result == 'valid' else 'alert-danger' }} bg-transparent text-white border-1">
            {{ '✅ Valid' if result == 'valid' else '❌ Invalid' }} ({{ similarity }}%)
        </div>
        {% endif %}
    </div>
</div>

<script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>
<script>
    gsap.registerPlugin(Draggable);
    const body = document.body;
    const glassCard = document.querySelector('.glass-card');

    Draggable.create(".cord-hit", {
        type: "y",
        bounds: { minY: 0, maxY: 50 },
        onDrag: function() {
            gsap.set(".cord-bead", { y: this.y });
            gsap.set(".cord-line", { attr: { y2: 180 + this.y } });
        },
        onRelease: function() {
            if (this.y > 25) toggle();
            gsap.to([".cord-bead", ".cord-hit"], { y: 0, duration: 0.4, ease: "back.out" });
            gsap.to(".cord-line", { attr: { y2: 180 }, duration: 0.4 });
        }
    });

    function toggle() {
        const state = body.getAttribute('data-on') === 'true';
        body.setAttribute('data-on', !state);
        document.documentElement.style.setProperty('--on', !state ? 1 : 0);
        glassCard.classList.toggle('active');
    }
</script>
</body>
</html>
